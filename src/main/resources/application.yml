server:
  port: 8080

spring:
  application:
    name: codepilot
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:db/schema/code_file.sql
        - classpath:db/schema/code_symbol.sql
        - classpath:db/schema/patch_record.sql
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/codepilot?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 60000
      connection-test-query: SELECT 1
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

security:
  jwt:
    secret: please-change-this-secret-in-production
    expire-seconds: 86400

codepilot:
  workspace:
    root: ./data/workspace
  github:
    base-url: https://github.com
  lock:
    task-run:
      ttl: 30m
  llm:
    provider: deepseek
    api-key: sk-c0e745f3ec65481786dbf13c4f17ad01
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
