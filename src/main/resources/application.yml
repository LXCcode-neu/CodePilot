server:
  port: 8080

spring:
  application:
    name: codepilot
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:db/schema/code_file.sql
        - classpath:db/schema/code_symbol.sql
        - classpath:db/schema/patch_record.sql
        - classpath:db/schema/project_llm_config.sql
        - classpath:db/schema/llm_api_key_config.sql
        - classpath:db/schema/notification_action_token.sql
        - classpath:db/schema/bot_action_code.sql
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/codepilot?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
      initialization-fail-timeout: 60000
      connection-test-query: SELECT 1
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

security:
  jwt:
    secret: please-change-this-secret-in-production
    expire-seconds: 86400

codepilot:
  app:
    public-base-url: ${CODEPILOT_PUBLIC_BASE_URL:http://localhost:8080}
  bot:
    feishu:
      enabled: ${FEISHU_BOT_ENABLED:false}
      base-url: ${FEISHU_OPEN_API_BASE_URL:https://open.feishu.cn}
      app-id: ${FEISHU_APP_ID:}
      app-secret: ${FEISHU_APP_SECRET:}
      verification-token: ${FEISHU_VERIFICATION_TOKEN:}
      encrypt-key: ${FEISHU_ENCRYPT_KEY:}
      default-chat-id: ${FEISHU_DEFAULT_CHAT_ID:}
  workspace:
    root: ./data/workspace
  git:
    clone-timeout-seconds: 120
  github:
    base-url: https://github.com
    api-base-url: https://api.github.com
    token: ${GITHUB_TOKEN:}
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    oauth-redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:}
    oauth-scope: ${GITHUB_OAUTH_SCOPE:repo read:user}
  secret:
    api-key-encryption-key: ${CODEPILOT_API_KEY_ENCRYPTION_KEY:please-change-this-api-key-encryption-key}
  lock:
    task-run:
      ttl: 30m
  search:
    mode: grep
    max-results: 30
    max-duration: 2m
    context-before-lines: 40
    context-after-lines: 40
    command-timeout-seconds: 10
    use-ripgrep: true
    fallback-enabled: true
    rg-path: rg
    default-exclude-patterns:
      - .git/**
      - target/**
      - build/**
      - dist/**
      - node_modules/**
      - .idea/**
      - .vscode/**
      - logs/**
      - tmp/**
  llm:
    provider: deepseek
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: https://api.deepseek.com
    model: deepseek-v4-flash
